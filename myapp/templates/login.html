{% extends 'base.html' %}
{% load static %}

{% block title %}
Login - Konkiyazham Kudumbayogam
{% endblock %}

{% block extra_css %}
<style>

main{
  background-color:#fff2e9;
  min-height:100vh;
  padding:40px;
}

.login-title{
  color:#000;
  font-size:26px;
  font-weight:bold;
  margin:0 0 30px 0;
}

.login-wrapper{
  max-width:400px;
  margin:0 auto;
}

.form-group{
  margin-bottom:20px;
}

.form-group label{
  display:block;
  font-size:14px;
  margin-bottom:6px;
  color:#333;
}

.form-group input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:4px;
}

.remember-box{
  margin-bottom:20px;
  display:flex;
  align-items:center;
}

.remember-box input{
  margin-right:8px;
}

.remember-box label{
  font-size:14px;
  color:#666;
}

.btn-group{
  display:flex;
  gap:15px;
  margin-bottom:20px;
}

.login-btn{
  flex:1;
  padding:10px;
  background:#3daee9;
  color:#fff;
  border:none;
  border-radius:4px;
  font-size:15px;
  font-weight:500;
}

.register-btn{
  flex:1;
  padding:10px;
  background:#f4f4f4;
  color:#555;
  border:1px solid #ddd;
  border-radius:4px;
  font-size:15px;
  font-weight:500;
}

.forgot-password{
  text-align:center;
}

.forgot-password a{
  font-size:14px;
  color:#888;
  text-decoration:none;
}

</style>
{% endblock %}

{% block content %}

<main>

  <h1 class="login-title">Login</h1>

  <div class="login-wrapper">

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username or E-mail</label>

        <input
          type="text"
          id="username"
          name="username"
          required
        >
      </div>

      <div class="form-group">

        <label for="password">Password</label>

        <input
          type="password"
          id="password"
          name="password"
          required
        >

      </div>

      <div class="remember-box">

        <input
          type="checkbox"
          id="remember"
          name="remember"
        >

        <label for="remember">
          Keep me signed in
        </label>

      </div>

      <div class="btn-group">

        <button
          type="submit"
          class="login-btn"
        >
          Login
        </button>

        <button
          type="button"
          class="register-btn"
        >
          Register
        </button>

      </div>

      <div class="forgot-password">
        <a href="#">
          Forgot your password?
        </a>
      </div>

    </form>

  </div>

</main>

{% endblock %}
